services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket_intelligence_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket_intelligence_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
      - PYTHONPATH=/workspace
    command: streamlit run app/frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
